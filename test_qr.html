<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuppTree QR-Code Test</title>
<script src="shared/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0fdf4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,0.1);max-width:400px;width:100%;text-align:center}
h2{color:#1a5a3a;margin-bottom:4px}
.code{font-family:monospace;font-size:14px;color:#00A67E;font-weight:700;margin-bottom:20px}
#qrContainer{margin:20px auto;padding:20px;background:#f9fafb;border-radius:12px}
.url{font-size:13px;color:#00A67E;font-weight:600;margin-top:12px}
.btns{display:flex;gap:8px;margin-top:20px}
.btns button{flex:1;padding:12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-dl{background:#1a5a3a;color:#fff}
.btn-print{background:#f3f4f6;color:#333}
.info{font-size:11px;color:#6b7280;margin-top:16px;line-height:1.5}
</style>
</head>
<body>
<div class="card">
  <h2>SuppTree QR-Code</h2>
  <div class="code" id="codeDisplay">49-01-00001</div>
  <div id="qrContainer">QR-Code wird generiert...</div>
  <div class="btns">
    <button class="btn-dl" onclick="downloadQR()">Download PNG</button>
    <button class="btn-print" onclick="window.print()">Drucken</button>
  </div>
  <div class="info">
    Scanne diesen QR-Code mit deinem Handy um die Landingpage zu testen.<br>
    URL: <span id="urlDisplay"></span>
  </div>
</div>
<script>
var PARTNER_CODE = '49-01-00001';
var BASE_URL = 'https://supptree.de/r/';
var fullURL = BASE_URL + PARTNER_CODE;
var _canvas = null;

document.getElementById('codeDisplay').textContent = PARTNER_CODE;
document.getElementById('urlDisplay').textContent = fullURL;

function generateQRCanvas(url, size, logoImg) {
  var canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext('2d');
  var qr = qrcode(0, 'H');
  qr.addData(url);
  qr.make();
  var modules = qr.getModuleCount();
  var padding = Math.floor(size * 0.06);
  var cellSize = (size - padding * 2) / modules;
  // White background with rounded corners
  ctx.fillStyle = '#ffffff';
  var r = Math.floor(size * 0.04);
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size - r, 0); ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r); ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath(); ctx.fill();
  // QR modules
  var logoRadius = Math.floor(size * 0.14);
  var center = size / 2;
  for (var row = 0; row < modules; row++) {
    for (var col = 0; col < modules; col++) {
      if (!qr.isDark(row, col)) continue;
      var x = padding + col * cellSize;
      var y = padding + row * cellSize;
      var dx = (x + cellSize / 2) - center;
      var dy = (y + cellSize / 2) - center;
      if (logoImg && Math.sqrt(dx * dx + dy * dy) < logoRadius + cellSize) continue;
      ctx.fillStyle = '#1a5a3a';
      var cr = cellSize * 0.35;
      ctx.beginPath();
      ctx.moveTo(x + cr, y);
      ctx.lineTo(x + cellSize - cr, y); ctx.quadraticCurveTo(x + cellSize, y, x + cellSize, y + cr);
      ctx.lineTo(x + cellSize, y + cellSize - cr); ctx.quadraticCurveTo(x + cellSize, y + cellSize, x + cellSize - cr, y + cellSize);
      ctx.lineTo(x + cr, y + cellSize); ctx.quadraticCurveTo(x, y + cellSize, x, y + cellSize - cr);
      ctx.lineTo(x, y + cr); ctx.quadraticCurveTo(x, y, x + cr, y);
      ctx.closePath(); ctx.fill();
    }
  }
  // Logo in center
  if (logoImg) {
    var logoSize = Math.floor(size * 0.22);
    var lx = center - logoSize / 2;
    var ly = center - logoSize / 2;
    ctx.save();
    ctx.beginPath();
    ctx.arc(center, center, logoSize / 2 + 4, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(center, center, logoSize / 2, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(logoImg, lx, ly, logoSize, logoSize);
    ctx.restore();
    ctx.beginPath();
    ctx.arc(center, center, logoSize / 2 + 2, 0, Math.PI * 2);
    ctx.strokeStyle = '#E8F5E9';
    ctx.lineWidth = 3;
    ctx.stroke();
  }
  return canvas;
}

function downloadQR() {
  if (!_canvas) return;
  var link = document.createElement('a');
  link.download = 'SuppTree-QR-' + PARTNER_CODE + '.png';
  link.href = _canvas.toDataURL('image/png');
  link.click();
}

// Generate QR
var logo = new Image();
logo.crossOrigin = 'anonymous';
logo.onload = function() {
  _canvas = generateQRCanvas(fullURL, 600, logo);
  var display = generateQRCanvas(fullURL, 260, logo);
  var container = document.getElementById('qrContainer');
  container.innerHTML = '';
  display.style.display = 'block';
  display.style.margin = '0 auto';
  container.appendChild(display);
};
logo.onerror = function() {
  _canvas = generateQRCanvas(fullURL, 600, null);
  var display = generateQRCanvas(fullURL, 260, null);
  var container = document.getElementById('qrContainer');
  container.innerHTML = '';
  display.style.display = 'block';
  display.style.margin = '0 auto';
  container.appendChild(display);
};
logo.src = 'www/assets/icon.png';
</script>
</body>
</html>
