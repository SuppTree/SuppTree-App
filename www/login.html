<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2E7D32">
  <title>SuppTree - Anmelden</title>
  <style>
:root {
  --green-dark: #2E7D32;
  --green-medium: #43A047;
  --green-accent: #66BB6A;
  --green-light: #A5D6A7;
  --green-bg: #F5EFE6;
  --white: #FFFFFF;
  --text-dark: #212121;
  --text-muted: #757575;
  --border: #E8E4DB;
  --radius: 7px;
  --shadow: 0 2px 12px rgba(0,0,0,0.04);
  --error: #EF5350;
  --error-bg: #FFEBEE;
  --success: #4CAF50;
  --success-bg: #E8F5E9;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
  background: linear-gradient(180deg, var(--green-dark) 0%, var(--green-medium) 35%, var(--green-bg) 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ── Logo ── */
.logo {
  text-align: center;
  margin-bottom: 28px;
}

.logo-icon {
  width: 68px;
  height: 68px;
  background: var(--white);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  margin: 0 auto 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}

.logo-text {
  font-size: 26px;
  font-weight: 800;
  color: var(--white);
}

.logo-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  margin-top: 4px;
}

/* ── Card ── */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--white);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  overflow: hidden;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  background: #f9f7f3;
  border-bottom: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 15px;
  border: none;
  background: none;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}

.tab.active {
  color: var(--green-dark);
  background: var(--white);
}

.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--green-dark);
  border-radius: 3px 3px 0 0;
}

/* ── Formulare ── */
.form {
  padding: 24px;
  display: none;
}

.form.active {
  display: block;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 13px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
}

.form-input:focus {
  border-color: var(--green-medium);
}

.form-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── Passwort Toggle ── */
.pw-wrap {
  position: relative;
}

.pw-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  opacity: 0.4;
}

.pw-toggle:hover { opacity: 1; }

/* ── Alerts ── */
.alert {
  padding: 11px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
  line-height: 1.4;
}

.alert.error { background: var(--error-bg); color: var(--error); border: 1px solid #FFCDD2; }
.alert.success { background: var(--success-bg); color: var(--success); border: 1px solid #C8E6C9; }
.alert.show { display: block; }

/* ── Rollenauswahl ── */
.role-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.role-card {
  padding: 16px 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--white);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.role-card:hover { border-color: var(--green-accent); }

.role-card.selected {
  border-color: var(--green-dark);
  background: #E8F5E9;
}

.role-card input { display: none; }
.role-card-icon { font-size: 28px; margin-bottom: 6px; }
.role-card-title { font-size: 13px; font-weight: 700; }
.role-card-desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* ── Seller-Felder (versteckt bis seller gewählt) ── */
.seller-fields {
  display: none;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.seller-fields.visible {
  display: block;
}

/* ── Seller-Typ Chips ── */
.type-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.type-chip {
  padding: 8px 14px;
  border: 2px solid var(--border);
  border-radius: 20px;
  background: var(--white);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}

.type-chip:hover { border-color: var(--green-accent); }

.type-chip.selected {
  border-color: var(--green-dark);
  background: #E8F5E9;
  color: var(--green-dark);
}

.type-chip input { display: none; }

/* ── Buttons ── */
.btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--green-dark), var(--green-medium));
  color: var(--white);
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  font-family: inherit;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(46,125,50,0.3);
}

.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.form-footer {
  margin-top: 16px;
  text-align: center;
}

.link {
  color: var(--green-dark);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
}

.link:hover { text-decoration: underline; }

.page-footer {
  text-align: center;
  margin-top: 20px;
  color: rgba(255,255,255,0.6);
  font-size: 12px;
}

.page-footer a { color: var(--white); text-decoration: none; }

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Passwort-Reset Modal ── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 100;
}

.modal-bg.active { display: flex; }

.modal {
  background: var(--white);
  border-radius: 16px;
  width: 100%;
  max-width: 360px;
  padding: 24px;
}

.modal h3 { font-size: 17px; margin-bottom: 6px; }
.modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }

.modal-btns {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.modal-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: inherit;
}

.modal-btn.sec { background: #f5f0ea; color: var(--text-dark); }
.modal-btn.pri { background: var(--green-dark); color: var(--white); }

.legal-text {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.5;
}
  </style>
</head>
<body>

<div class="logo">
  <div class="logo-icon">🌿</div>
  <div class="logo-text">SuppTree</div>
  <div class="logo-sub">Supplements. Einfach. Gesund.</div>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Anmelden</button>
    <button class="tab" onclick="showTab('register')">Konto erstellen</button>
  </div>

  <!-- ═══ LOGIN ═══ -->
  <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
    <div class="alert error" id="loginError"></div>
    <div class="alert success" id="loginSuccess"></div>

    <div class="form-group">
      <label class="form-label">E-Mail</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="name@beispiel.de" required autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Passwort</label>
      <div class="pw-wrap">
        <input type="password" class="form-input" id="loginPassword" placeholder="Ihr Passwort" required autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePw('loginPassword',this)">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn" id="loginBtn">Anmelden</button>

    <div class="form-footer">
      <a href="#" class="link" onclick="openReset(); return false;">Passwort vergessen?</a>
    </div>

    <!-- DEV: Schnellzugriff ohne Login (nur im Demo-Modus sichtbar) -->
    <div id="devBypassSection" style="display:none;margin-top:24px;padding-top:20px;border-top:2px dashed #e5e7eb">
      <div style="text-align:center;font-size:11px;color:#9ca3af;margin-bottom:12px;font-weight:600;letter-spacing:0.5px">DEV-ZUGANG (ohne Login)</div>
      <div style="display:flex;gap:8px">
        <button type="button" onclick="window.location.href='index.html'" style="flex:1;padding:12px 8px;border:2px solid #43A047;background:#E8F5E9;color:#2E7D32;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">🛒 Kunde</button>
        <button type="button" onclick="window.location.href='../partner/index.html'" style="flex:1;padding:12px 8px;border:2px solid #00A67E;background:#E0F2F1;color:#00695C;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">🏪 Seller</button>
        <button type="button" onclick="window.location.href='../admin/index.html'" style="flex:1;padding:12px 8px;border:2px solid #3F51B5;background:#E8EAF6;color:#1A237E;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">👑 Admin</button>
      </div>
    </div>
    <script>
      // Dev-Bypass nur im Demo-Modus anzeigen
      if (localStorage.getItem('suppTreeAppMode') !== 'production') {
        document.getElementById('devBypassSection').style.display = 'block';
      }
    </script>
  </form>

  <!-- ═══ REGISTRIERUNG ═══ -->
  <form class="form" id="registerForm" onsubmit="handleRegister(event)">
    <div class="alert error" id="regError"></div>
    <div class="alert success" id="regSuccess"></div>

    <!-- Schritt 1: Rolle -->
    <div class="form-group">
      <label class="form-label">Wie möchtest du SuppTree nutzen?</label>
      <div class="role-cards">
        <label class="role-card selected" onclick="selectRole('customer')">
          <input type="radio" name="role" value="customer" checked>
          <div class="role-card-icon">🛒</div>
          <div class="role-card-title">Einkaufen</div>
          <div class="role-card-desc">Supplements kaufen & tracken</div>
        </label>
        <label class="role-card" onclick="selectRole('seller')">
          <input type="radio" name="role" value="seller">
          <div class="role-card-icon">🏪</div>
          <div class="role-card-title">Verkaufen</div>
          <div class="role-card-desc">Auf SuppTree verkaufen</div>
        </label>
      </div>
    </div>

    <!-- Schritt 2: Name -->
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Vorname</label>
        <input type="text" class="form-input" id="regFirstName" placeholder="Max" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label class="form-label">Nachname</label>
        <input type="text" class="form-input" id="regLastName" placeholder="Mustermann" autocomplete="family-name">
      </div>
    </div>

    <!-- Seller-spezifische Felder -->
    <div class="seller-fields" id="sellerFields">
      <div class="form-group">
        <label class="form-label">Firmenname</label>
        <input type="text" class="form-input" id="regCompany" placeholder="Meine Firma GmbH" autocomplete="organization">
      </div>

      <div class="form-group">
        <label class="form-label">Was verkaufst du?</label>
        <div class="type-chips">
          <label class="type-chip selected" onclick="selectType('supplement')">
            <input type="radio" name="seller_type" value="supplement" checked>
            <span>💊</span> Supplements
          </label>
          <label class="type-chip" onclick="selectType('heilpraktiker')">
            <input type="radio" name="seller_type" value="heilpraktiker">
            <span>🩺</span> Heilpraktiker
          </label>
          <label class="type-chip" onclick="selectType('coach')">
            <input type="radio" name="seller_type" value="coach">
            <span>🏋️</span> Coach
          </label>
        </div>
      </div>
    </div>

    <!-- Schritt 3: Zugangsdaten -->
    <div class="form-group">
      <label class="form-label">E-Mail</label>
      <input type="email" class="form-input" id="regEmail" placeholder="name@beispiel.de" required autocomplete="email">
    </div>

    <div class="form-group">
      <label class="form-label">Passwort</label>
      <div class="pw-wrap">
        <input type="password" class="form-input" id="regPassword" placeholder="Min. 6 Zeichen" required minlength="6" autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="togglePw('regPassword',this)">👁️</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Passwort bestätigen</label>
      <div class="pw-wrap">
        <input type="password" class="form-input" id="regPasswordConfirm" placeholder="Passwort wiederholen" required autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="togglePw('regPasswordConfirm',this)">👁️</button>
      </div>
    </div>

    <button type="submit" class="btn" id="regBtn">Konto erstellen</button>

    <div class="form-footer">
      <span class="legal-text">
        Mit der Registrierung akzeptierst du unsere
        <a href="#" class="link">AGB</a> und
        <a href="#" class="link">Datenschutzrichtlinie</a>.
      </span>
    </div>
  </form>
</div>

<div class="page-footer">
  <a href="index.html">Zurück zur App</a>
</div>

<!-- ═══ Passwort-Reset Modal ═══ -->
<div class="modal-bg" id="resetModal" onclick="if(event.target===this)closeReset()">
  <div class="modal">
    <h3>Passwort zurücksetzen</h3>
    <p>Wir senden dir einen Link zum Zurücksetzen per E-Mail.</p>
    <div class="alert error" id="resetError"></div>
    <div class="alert success" id="resetSuccess"></div>
    <div class="form-group" style="margin-bottom:0">
      <input type="email" class="form-input" id="resetEmail" placeholder="name@beispiel.de">
    </div>
    <div class="modal-btns">
      <button class="modal-btn sec" onclick="closeReset()">Abbrechen</button>
      <button class="modal-btn pri" onclick="handleReset()">Absenden</button>
    </div>
  </div>
</div>

<!-- ═══ Scripts ═══ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/config.js"></script>
<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>

<script>
// ── Tab-Wechsel ──
function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
  if (id === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('loginForm').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('registerForm').classList.add('active');
  }
  hideAlerts();
}

// ── Rollenauswahl ──
function selectRole(role) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  document.querySelector('.role-card input[value="' + role + '"]').parentElement.classList.add('selected');
  document.getElementById('sellerFields').classList.toggle('visible', role === 'seller');
}

// ── Seller-Typ ──
function selectType(type) {
  document.querySelectorAll('.type-chip').forEach(c => c.classList.remove('selected'));
  document.querySelector('.type-chip input[value="' + type + '"]').parentElement.classList.add('selected');
}

// ── Passwort anzeigen/verbergen ──
function togglePw(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁️' : '🙈';
}

// ── Alerts ──
function showAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function hideAlerts() {
  document.querySelectorAll('.alert').forEach(a => { a.classList.remove('show'); a.textContent = ''; });
}

function setLoading(btn, on) {
  if (on) {
    btn.disabled = true;
    btn.dataset.text = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>Bitte warten...';
  } else {
    btn.disabled = false;
    btn.textContent = btn.dataset.text;
  }
}

// ── Weiterleitung je nach Rolle ──
function redirectByRole(role) {
  // Erfolgreicher Supabase-Login → Production-Modus setzen
  localStorage.setItem('suppTreeAppMode', 'production');
  if (role === 'admin') {
    window.location.href = '../admin/index.html';
  } else if (role === 'seller') {
    window.location.href = '../partner/index.html';
  } else {
    window.location.href = 'index.html';
  }
}

// ── LOGIN ──
async function handleLogin(e) {
  e.preventDefault();
  hideAlerts();

  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');

  setLoading(btn, true);
  const result = await loginUser(email, pw);

  if (result.error) {
    showAlert('loginError', result.error);
    setLoading(btn, false);
    return;
  }

  const role = await getCurrentUserRole();
  redirectByRole(role);
}

// ── REGISTRIERUNG ──
async function handleRegister(e) {
  e.preventDefault();
  hideAlerts();

  const firstName = document.getElementById('regFirstName').value.trim();
  const lastName = document.getElementById('regLastName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw = document.getElementById('regPassword').value;
  const pwConfirm = document.getElementById('regPasswordConfirm').value;
  const role = document.querySelector('input[name="role"]:checked').value;
  const btn = document.getElementById('regBtn');

  if (pw !== pwConfirm) {
    showAlert('regError', 'Passwörter stimmen nicht überein');
    return;
  }

  const userData = { name: (firstName + ' ' + lastName).trim() };

  // Seller-spezifische Daten
  if (role === 'seller') {
    userData.company = document.getElementById('regCompany').value.trim();
    userData.seller_type = document.querySelector('input[name="seller_type"]:checked')?.value || 'supplement';
  }

  setLoading(btn, true);
  const result = await registerUser(email, pw, role, userData);

  if (result.error) {
    showAlert('regError', result.error);
    setLoading(btn, false);
    return;
  }

  // Prüfe ob Email-Bestätigung nötig ist
  if (result.user?.identities?.length === 0) {
    showAlert('regError', 'Diese E-Mail ist bereits registriert');
    setLoading(btn, false);
    return;
  }

  // Wenn Session direkt vorhanden (Email-Bestätigung deaktiviert)
  if (result.session) {
    redirectByRole(role);
    return;
  }

  // Email-Bestätigung nötig
  showAlert('regSuccess', 'Konto erstellt! Bitte bestätige deine E-Mail-Adresse.');
  setLoading(btn, false);
}

// ── PASSWORT RESET ──
function openReset() {
  document.getElementById('resetModal').classList.add('active');
  document.getElementById('resetEmail').value = document.getElementById('loginEmail').value;
  hideAlerts();
}

function closeReset() {
  document.getElementById('resetModal').classList.remove('active');
  hideAlerts();
}

async function handleReset() {
  hideAlerts();
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) { showAlert('resetError', 'Bitte E-Mail eingeben'); return; }

  const result = await resetPassword(email);
  if (result.error) { showAlert('resetError', result.error); return; }

  showAlert('resetSuccess', 'Link gesendet! Prüfe deinen Posteingang.');
  setTimeout(closeReset, 3000);
}

// ── URL-Parameter ──
document.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(window.location.search);
  if (p.get('error') === 'unauthorized') showAlert('loginError', 'Du benötigst ein Verkäufer-Konto für das Partner-Portal.');
  if (p.get('logout') === 'true') showAlert('loginSuccess', 'Erfolgreich abgemeldet.');
  if (p.get('reset') === 'true') showAlert('loginSuccess', 'Du kannst jetzt ein neues Passwort setzen.');

  // Bereits eingeloggt? Weiterleiten
  checkSession().then(session => {
    if (session) {
      getCurrentUserRole().then(role => redirectByRole(role));
    }
  });
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeReset(); });
</script>

</body>
</html>
